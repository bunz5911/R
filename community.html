<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1, viewport-fit=cover" name="viewport"/>
    <title>Community — Storynara</title>
    <link as="style" crossorigin="" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet"/>
    <link href="assets/community.css" rel="stylesheet"/>
</head>
<body class="community-page">
<header class="site-header">
    <nav aria-label="Community navigation" class="site-nav" id="site-nav">
        <div aria-label="Language" class="lang-switch" role="navigation">
            <a aria-label="한국어" class="lang-btn" href="community-ko.html">KOR</a>
            <a aria-current="page" aria-label="English" class="lang-btn lang-btn--active" href="community.html">ENG</a>
        </div>
        <a href="index.html">Home</a>
        <a class="nav-link--active" href="community.html">Community</a>
    </nav>
</header>

<main class="community-main">
    <header class="community-hero">
        <h1>Community</h1>
        <p>Share daily Korean, ask questions, exchange tips, and connect with fellow learners. Anyone can read posts; sign in to write.</p>
    </header>

    <div class="community-alert community-alert--error" hidden id="community-alert"></div>

    <div class="community-auth-bar">
        <p class="community-auth-status" id="auth-status">Loading…</p>
        <div class="community-auth-actions">
            <button class="cm-btn cm-btn--ghost" id="btn-login" type="button">Log in</button>
            <button class="cm-btn cm-btn--outline" id="btn-signup" type="button">Sign up</button>
            <button class="cm-btn cm-btn--outline" hidden id="btn-logout" type="button">Log out</button>
            <button class="cm-btn cm-btn--primary" id="btn-write" type="button">Write post</button>
        </div>
    </div>

    <div class="community-categories" id="category-tabs"></div>

    <section aria-labelledby="board-category-title" class="community-board">
        <div class="community-board-header">
            <h2 id="board-category-title">Posts</h2>
        </div>
        <ul class="post-list" id="post-list"></ul>
    </section>
</main>

<div class="cm-modal-overlay" hidden id="modal-overlay">
    <div aria-labelledby="modal-title" aria-modal="true" class="cm-modal cm-modal--wide" role="dialog">
        <div class="cm-modal__header">
            <h3 id="modal-title"></h3>
            <button aria-label="Close" class="cm-modal__close" id="modal-close" type="button">×</button>
        </div>
        <div class="cm-modal__body" id="modal-body"></div>
        <div class="cm-modal__footer" id="modal-footer"></div>
    </div>
</div>

<script src="assets/supabase-config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="assets/community.js"></script>
</body>
</html>
